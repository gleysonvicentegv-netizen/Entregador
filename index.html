<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Express - Entregador</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#333333">
<link rel="apple-touch-icon" href="logo.png">
<style>
body { font-family: Arial,sans-serif; margin:0; padding:0; background:#f2f2f2; }
header { background:#25D366; color:white; padding:15px; text-align:center; font-size:18px; font-weight:bold; }
.container { max-width:600px; margin:20px auto; }
.section-title { font-weight:bold; margin:15px 0 5px; }
.card { background:white; border-radius:8px; padding:12px; margin-bottom:10px; box-shadow:0 3px 10px rgba(0,0,0,0.15); }
.card .info { font-size:14px; margin:3px 0; }
.card .buttons { margin-top:8px; display:flex; gap:8px; }
.card button { flex:1; padding:8px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
.accept { background:#007bff; color:white; }
.cheguei { background:#ffc107; color:white; }
.complete { background:#25D366; color:white; }
.footer { text-align:center; font-size:14px; color:#555; margin-top:20px; }
#pedidoAtivo { display:none; }
input#nomeConfirm { width:100%; padding:10px; margin-top:10px; border-radius:6px; border:1px solid #ccc; }
</style>
</head>
<body>

<header>Master Express - Entregador</header>
<div class="container">

  <div id="pendentesSection">
    <div class="section-title">Pedidos Pendentes</div>
    <div id="pendentes"></div>
  </div>

  <div id="pedidoAtivo">
    <div class="section-title">Pedido em andamento</div>
    <div class="card" id="cardAtivo"></div>
    <input type="text" id="nomeConfirm" placeholder="Digite o nome do cliente para encerrar">
    <div class="buttons">
      <button class="cheguei" onclick="cheguei()">Cheguei</button>
      <button class="complete" onclick="encerrar()">Encerrar</button>
    </div>
  </div>

</div>

<footer class="footer">Master Express - Entregas em Macaé</footer>

<script>
// Simulação de pedidos (JSON público ou API futuramente)
let pedidos = [
  {id:1,nomeRemetente:"Loja A",telRemetente:"22999999999",endRemetente:"Rua 1",endEntrega:"Rua 2",valor:12.5,urgente:"Não",aceito:false},
  {id:2,nomeRemetente:"Loja B",telRemetente:"22988888888",endRemetente:"Rua 3",endEntrega:"Rua 4",valor:15.0,urgente:"Sim",aceito:false}
];

let pedidoAtual = null;

// Renderiza pedidos pendentes
function renderizarPendentes(){
  const pend = document.getElementById('pendentes');
  pend.innerHTML = '';
  if(pedidoAtual) {
    document.getElementById('pendentesSection').style.display='none';
    document.getElementById('pedidoAtivo').style.display='block';
    return;
  }
  document.getElementById('pendentesSection').style.display='block';
  document.getElementById('pedidoAtivo').style.display='none';

  pedidos.filter(p=>!p.aceito).forEach(p=>{
    const div = document.createElement('div');
    div.className='card';
    div.innerHTML = `
      <div class="info"><strong>Remetente:</strong> ${p.nomeRemetente}</div>
      <div class="info"><strong>Coleta:</strong> ${p.endRemetente}</div>
      <div class="info"><strong>Entrega:</strong> ${p.endEntrega}</div>
      <div class="info"><strong>Valor:</strong> R$ ${p.valor}</div>
      <div class="info"><strong>Urgente:</strong> ${p.urgente}</div>
      <div class="buttons"><button class="accept" onclick="aceitar(${p.id})">Aceitar</button></div>
    `;
    pend.appendChild(div);
  });
}

// Aceitar pedido
function aceitar(id){
  pedidoAtual = pedidos.find(p=>p.id===id);
  pedidoAtual.aceito=true;
  renderizarAtivo();
  renderizarPendentes();
  alert('Pedido aceito! Dirija-se ao local de coleta.');
}

// Renderiza pedido ativo
function renderizarAtivo(){
  if(!pedidoAtual) return;
  const card = document.getElementById('cardAtivo');
  card.innerHTML = `
    <div class="info"><strong>Remetente:</strong> ${pedidoAtual.nomeRemetente} - ${pedidoAtual.telRemetente}</div>
    <div class="info"><strong>Coleta:</strong> ${pedidoAtual.endRemetente}</div>
    <div class="info"><strong>Entrega:</strong> ${pedidoAtual.endEntrega}</div>
    <div class="info"><strong>Valor:</strong> R$ ${pedidoAtual.valor}</div>
    <div class="info"><strong>Urgente:</strong> ${pedidoAtual.urgente}</div>
  `;
}

// Cheguei
function cheguei(){
  alert('Você chegou ao local de entrega.');
}

// Encerrar pedido
function encerrar(){
  const nomeInput = document.getElementById('nomeConfirm').value.trim();
  if(!nomeInput){
    alert('Digite o nome do cliente para encerrar a entrega.');
    return;
  }
  if(nomeInput.toLowerCase()!==pedidoAtual.nomeRemetente.toLowerCase()){
    alert('Nome incorreto! Confirme com o nome do cliente.');
    return;
  }
  pedidoAtual=null;
  document.getElementById('nomeConfirm').value='';
  renderizarPendentes();
  alert('Entrega concluída! Você pode pegar o próximo pedido.');
}

// Inicial
renderizarPendentes();
</script>

</body>
</html>
